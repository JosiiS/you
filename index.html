<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Surpresa🌌💙</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    overflow: hidden;
    background: radial-gradient(ellipse at bottom, #1e3c72 0%, #2a5298 100%);
    position: relative;
}

/* estrelas pequenas */
.star {
    position: absolute;
    background: white;
    border-radius: 50%;
    opacity: 0.8;
    animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
    0% { opacity: 0.3; }
    100% { opacity: 1; }
}

.botao {
    padding: 20px 40px;
    font-size: 28px;
    background: white;
    color: #2a9df4;
    border-radius: 15px;
    text-decoration: none;
    cursor: pointer;
    transition: 0.3s;
    z-index: 2;
}

.botao:hover {
    transform: scale(1.1);
}

.mensagem {
    display: none;
    color: white;
    font-size: 40px;
    z-index: 2;
}

img {
    width: 250px;
    border-radius: 20px;
    margin-top: 20px;
    box-shadow: 0 0 20px rgba(255,255,255,0.6);
    display: none;
    z-index: 2;
}

.coracao {
    position: absolute;
    color: #00cfff; /* azul céu */
    font-size: 20px;
    animation: cair 5s linear infinite;
}

@keyframes cair {
    0% { transform: translateY(-10vh); }
    100% { transform: translateY(110vh); }
}
</style>
</head>

<body>

<div>
    <button class="botao" onclick="mostrarMensagem()">Clique aqui 🌌💙</button>

    <div class="mensagem" id="mensagem">
        Só pra você não esquecer que te amo 💙
    </div>

    <img src="foto.jpg" alt="Foto" id="foto">
</div>

<script>
// gerar estrelas aleatórias
for(let i=0; i<100; i++){
    const star = document.createElement("div");
    star.classList.add("star");
    star.style.width = Math.random()*3 + 1 + "px";
    star.style.height = star.style.width;
    star.style.top = Math.random()*100 + "vh";
    star.style.left = Math.random()*100 + "vw";
    document.body.appendChild(star);
}

function mostrarMensagem() {
    document.getElementById("mensagem").style.display = "block";
    document.getElementById("foto").style.display = "block";
    
    // Começar a chuva de corações
    setInterval(criarCoracao, 300);
}

function criarCoracao() {
    const coracao = document.createElement("div");
    coracao.classList.add("coracao");
    coracao.innerHTML = "💙"; // corações azul céu
    coracao.style.left = Math.random() * 100 + "vw";
    coracao.style.fontSize = (Math.random() * 20 + 20) + "px";
    coracao.style.animationDuration = (Math.random() * 3 + 2) + "s";
    document.body.appendChild(coracao);

    setTimeout(() => {
        coracao.remove();
    }, 5000);
}
</script>

</body>
</html>
